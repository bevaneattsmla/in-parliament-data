name: Validate cards and bills

# Runs the card and bill gates automatically on every push and pull request.
# If the data has a duplicate id, a bad status or stage, a broken shape, or an
# em-dash, this fails and the change is blocked. No one can publish broken data.

on:
  push:
    paths:
      - 'data/**'
      - 'validate-cards.js'
      - 'validate-bills.js'
  pull_request:
    paths:
      - 'data/**'
      - 'validate-cards.js'
      - 'validate-bills.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run the card validator
        run: node validate-cards.js
      - name: Run the bill validator
        run: node validate-bills.js
