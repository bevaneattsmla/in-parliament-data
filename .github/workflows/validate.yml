name: Validate cards

# Runs the card gate automatically on every push and pull request.
# If the data has a duplicate id, a bad status, a broken shape, or an em-dash,
# this fails and the change is blocked. No one can publish a broken card.

on:
  push:
    paths:
      - 'data/**'
      - 'validate-cards.js'
  pull_request:
    paths:
      - 'data/**'
      - 'validate-cards.js'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run the card validator
        run: node validate-cards.js
